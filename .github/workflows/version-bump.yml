name: Version Bump

# On every push to main, auto-increment the patch in VERSION and tag it —
# unless VERSION was already changed in this push (a deliberate minor/major
# bump in the PR), in which case the manual value is respected.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the bot's own bump commit. (Pushes made with GITHUB_TOKEN don't
    # retrigger workflows anyway; this and the [skip ci] tag are extra guards.)
    if: "${{ !contains(github.event.head_commit.message, 'chore: bump version') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Bump patch and tag
        run: |
          set -euo pipefail

          # Respect a manual VERSION change in this push.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -qx VERSION; then
              echo "VERSION changed in this push — respecting manual bump ($(cat VERSION)). No auto-bump."
              exit 0
            fi
          fi

          current="$(cat VERSION)"
          IFS='.' read -r major minor patch <<< "$current"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "VERSION '$current' is not in MAJOR.MINOR.PATCH form; aborting." >&2
            exit 1
          fi

          next="${major}.${minor}.$((patch + 1))"
          echo "Bumping ${current} -> ${next}"
          printf '%s\n' "${next}" > VERSION

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${next} [skip ci]"
          git tag "v${next}"
          git push origin HEAD:main
          git push origin "v${next}"

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest pyyaml jinja2
      - name: Configure git identity (sync/connection tests commit to a local bare repo)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "pm-os-ci"
          git config --global init.defaultBranch main
      - name: Run the deterministic suite
        run: python -m pytest -m "not slow" -ra

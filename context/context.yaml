# PM-OS context overlay — manifest
#
# STATUS: skeleton. This pack is NOT yet wired into the engine.
# Nothing reads this file until Phase 1 (lib/context.py + the "Load context"
# step in each stage skill) is built. For now this just defines the shape and
# holds your content so it's ready to mount.
#
# Layering (precedence high -> low): project override > stage pack > global.
# apply modes:
#   augment        -> keep the skill's default Output spec, fold these in (CHOSEN DEFAULT)
#   override        -> this format's sections REPLACE the skill's default output spec
#   reference-only  -> examples shown for tone/depth only, not structure

schema_version: 1
active_pack: indegene
description: Indegene life-sciences PM context

# Applied to every project, every stage.
global:
  - global/company.md
  - global/team.md
  - global/glossary.md
  - global/guardrails.md

# Per-stage context. Add more stages (01,02,03,05,07) by following the same shape.
stages:
  "04":
    format:   stages/04-design-spec/format.md
    examples: [stages/04-design-spec/example.md]
    apply: augment
  "06":
    format:   stages/06-qa-plan/format.md
    examples: [stages/06-qa-plan/example.md]
    apply: augment
  "08":
    format:   stages/08-trd/format.md
    examples: [stages/08-trd/example.md]
    apply: augment
